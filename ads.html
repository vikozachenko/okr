<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="author" content="Вікторія" />
    <link rel="stylesheet" href="css/style.css">
    <title>Оголошення</title>
  </head>

  <body>
    <h1>Список оголошень</h1>

    <a id="top">Актуальні оголошення</a>

    <p><b>Категорії оголошень:</b></p>

    <ul>
      <li>Продаж</li>
      <li>Оренда</li>
      <li>Послуги</li>
    </ul>

    <a id="services">Послуги</a>
    <a href="#services">Перейти до послуг</a>

    <p>
      <img
        src="image/backgr.png"
        width="100"
        height="75"
        alt="Зменшене зображення"
      />
    </p>

    <table>

      <colgroup>
        <col span="1">
        <col span="2">
        <col span="1">
      </colgroup>

      <caption><b>Структура оголошень</b></caption>

      <tr>
        <th>Категорія</th>
        <th colspan="2">Інформація</th>
        <th>Статус</th>
      </tr>

      <tr>
        <td>Продаж</td>
        <td>Товар</td>
        <td>Ціна</td>
        <td>Активне</td>
      </tr>

      <tr>
        <td>Товар</td>
        <td>Телефон</td>
        <td>5000 грн</td>
        <td>Активне</td>
      </tr>

      <tr>
        <td>Послуги</td>
        <td colspan="2">Ремонт побутової техніки</td>
        <td>Нове</td>
      </tr>

    </table>

  </body>
</html>
